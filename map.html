<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Big H Sports Bar &amp; Grill — map</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" integrity="sha384-sHL9NAb7lN7rfvG5lfHpm643Xkcjzp4jFvuavGOndn6pjVqS6ny56CAt3nsEVT4H" crossorigin="anonymous">
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" integrity="sha384-cxOPjt7s7Iz04uaHJceBmS+qpjv2JkIHNVcuOrM+YHwZOmJGBXI00mdUXEq65HTH" crossorigin="anonymous"></script>
<style>html,body,#map{margin:0;height:100%;width:100%;background:#161009}</style>
</head>
<body>
<div id="map"></div>
<script>
const spot = [40.5271, -85.6607]; // 3022 S Washington St, Marion IN
const map = L.map('map', {scrollWheelZoom: false}).setView(spot, 15);
L.tileLayer('https://tile.openstreetmap.org/{z}/{x}/{y}.png', { attribution: '© OpenStreetMap contributors' }).addTo(map);
L.marker(spot).addTo(map).bindPopup('<b>Big H Sports Bar & Grill</b><br>3022 S Washington St<br>Marion, IN 46953<br><a href="https://maps.app.goo.gl/W6Pt8QaQuVn1238e7" target="_blank" rel="noopener">Open in Google Maps</a>').openPopup();
</script>
</body>
</html>
